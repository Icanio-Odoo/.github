# =============================================================================
# Reusable Odoo Deployment Workflow — EFS Diff Based
# Repo : Icanio-Odoo/.github
# Path : .github/workflows/odoo-deploy.yml
#
# Stages (all auto after PR merge):
#   1. Checkout       → clone/pull the repo on runner VM
#   2. Detect         → diff EFS vs repo to find new/changed modules
#   3. Copy to EFS    → copy only changed/new modules to EFS
#   4. Install/Upgrade→ -i for new modules, -u for changed modules
#   5. Restart Pod    → kubectl rollout restart
#   6. Summary        → show what was deployed
# =============================================================================

name: Odoo Deploy (reusable)

on:
  workflow_call:
    inputs:
      repo_key:
        description: "Short key: hr | finance | techschool | addons"
        required: true
        type: string
      branch:
        description: "Branch to deploy"
        required: false
        type: string
        default: "development"
    secrets:
      ODOO_DB_NAME:
        required: true
      ODOO_ADMIN_PASSWORD:
        required: true

jobs:
  deploy:
    name: "Deploy ${{ inputs.repo_key }}"
    runs-on: [self-hosted, odoo-deploy]
    timeout-minutes: 30

    env:
      REPO_URL_HR:         git@github.com:Icanio-Odoo/HR-Repo.git
      REPO_URL_FINANCE:    git@github.com:Icanio-Odoo/Finance-Team-Repo.git
      REPO_URL_TECHSCHOOL: git@github.com:Icanio-Odoo/TechSchool-Repo.git
      REPO_URL_ADDONS:     git@github.com:Icanio-Odoo/odoo-addons.git
      NAMESPACE:           ${{ vars.ODOO_NAMESPACE }}
      EFS_PATH:            ${{ vars.EFS_ADDONS_PATH }}
      ODOO_DB:             ${{ secrets.ODOO_DB_NAME }}
      ODOO_URL:            ${{ vars.ODOO_URL }}
      ODOO_CONF:           /etc/odoo/odoo.conf
      ODOO_BIN:            /usr/bin/odoo

    steps:

      # ────────────────────────────────────────────────────────────────────
      # STAGE 1 — CHECKOUT
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 1 — Checkout"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STAGE 1 — CHECKOUT"
          echo "  Repo   : ${{ inputs.repo_key }}"
          echo "  Branch : ${{ inputs.branch }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          case "${{ inputs.repo_key }}" in
            hr)         REPO_URL="$REPO_URL_HR";         REPO_DIR="$HOME/HR-Repo" ;;
            finance)    REPO_URL="$REPO_URL_FINANCE";    REPO_DIR="$HOME/Finance-Team-Repo" ;;
            techschool) REPO_URL="$REPO_URL_TECHSCHOOL"; REPO_DIR="$HOME/TechSchool-Repo" ;;
            addons)     REPO_URL="$REPO_URL_ADDONS";     REPO_DIR="$HOME/odoo-addons" ;;
            *) echo "::error::Unknown repo key: ${{ inputs.repo_key }}"; exit 1 ;;
          esac

          echo "REPO_DIR=$REPO_DIR" >> $GITHUB_ENV
          echo "ADDONS_SRC=$REPO_DIR/custom_addons" >> $GITHUB_ENV

          if [ -d "$REPO_DIR/.git" ]; then
            echo "Repo exists — syncing to latest..."
            cd "$REPO_DIR"
            git fetch origin
            git checkout "${{ inputs.branch }}"
            git reset --hard origin/"${{ inputs.branch }}"
            echo "✅ Reset to latest origin/${{ inputs.branch }}"
          else
            echo "Cloning repo..."
            git clone -b "${{ inputs.branch }}" "$REPO_URL" "$REPO_DIR"
            echo "✅ Cloned into $REPO_DIR"
          fi

      # ────────────────────────────────────────────────────────────────────
      # STAGE 2 — DETECT CHANGES (EFS diff)
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 2 — Detect changes (EFS diff)"
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STAGE 2 — DETECT CHANGES"
          echo "  Comparing repo modules vs EFS: $EFS_PATH"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          INSTALL_MODS=""
          UPGRADE_MODS=""

          if [ ! -d "$ADDONS_SRC" ]; then
            echo "::error::custom_addons directory not found at $ADDONS_SRC"
            exit 1
          fi

          for MODULE_PATH in "$ADDONS_SRC"/*/; do
            MODULE=$(basename "$MODULE_PATH")

            # Skip OCA repo folders (no __manifest__.py at root)
            if [ ! -f "$MODULE_PATH/__manifest__.py" ]; then
              echo "  [SKIP] $MODULE — OCA folder, not a direct module"
              continue
            fi

            EFS_MODULE="$EFS_PATH/$MODULE"

            if [ ! -d "$EFS_MODULE" ]; then
              echo "  [NEW]       $MODULE → will be INSTALLED"
              INSTALL_MODS="$INSTALL_MODS $MODULE"
            else
              DIFF=$(diff -rq \
                --exclude="*.pyc" \
                --exclude="__pycache__" \
                --exclude=".git" \
                "$MODULE_PATH" "$EFS_MODULE" 2>/dev/null || true)

              if [ -n "$DIFF" ]; then
                echo "  [CHANGED]   $MODULE → will be UPGRADED"
                UPGRADE_MODS="$UPGRADE_MODS $MODULE"
              else
                echo "  [NO CHANGE] $MODULE → skipping"
              fi
            fi
          done

          INSTALL_MODS=$(echo "$INSTALL_MODS" | xargs)
          UPGRADE_MODS=$(echo "$UPGRADE_MODS" | xargs)

          echo "INSTALL_MODS=$INSTALL_MODS" >> $GITHUB_ENV
          echo "UPGRADE_MODS=$UPGRADE_MODS" >> $GITHUB_ENV

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DETECTION SUMMARY"
          [ -n "$INSTALL_MODS" ] && echo "  🆕 To INSTALL : $INSTALL_MODS"
          [ -n "$UPGRADE_MODS" ] && echo "  🔄 To UPGRADE : $UPGRADE_MODS"
          if [ -z "$INSTALL_MODS" ] && [ -z "$UPGRADE_MODS" ]; then
            echo "  ✅ No changes detected — nothing to deploy"
            echo "no_changes=true" >> $GITHUB_ENV
          else
            echo "no_changes=false" >> $GITHUB_ENV
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ────────────────────────────────────────────────────────────────────
      # STAGE 3 — COPY TO EFS
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 3 — Copy changed modules to EFS"
        if: env.no_changes == 'false'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STAGE 3 — COPY TO EFS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ALL_DEPLOY_MODS="$INSTALL_MODS $UPGRADE_MODS"

          for MODULE in $ALL_DEPLOY_MODS; do
            SRC="$ADDONS_SRC/$MODULE"
            DEST="$EFS_PATH/$MODULE"

            echo "  Copying $MODULE → EFS..."
            sudo mkdir -p "$DEST"
            sudo chown -R admin:admin "$DEST" 2>/dev/null || true
            cp -ruf "$SRC/." "$DEST/"
            sudo chown -R uuidd:uuidd "$DEST"
            echo "  ✅ $MODULE copied"
          done
          echo ""
          echo "  All modules copied to EFS successfully"

      # ────────────────────────────────────────────────────────────────────
      # STAGE 4 — INSTALL / UPGRADE IN ODOO
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 4 — Install / Upgrade modules in Odoo"
        if: env.no_changes == 'false'
        env:
          ODOO_ADMIN_PASSWORD: ${{ secrets.ODOO_ADMIN_PASSWORD }}
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STAGE 4 — INSTALL / UPGRADE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          POD=$(kubectl get pod -n "$NAMESPACE" -l app=odoo \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

          if [ -z "$POD" ]; then
            echo "::error::No running Odoo pod found in namespace '$NAMESPACE'"
            exit 1
          fi
          echo "  Pod: $POD"
          echo "POD=$POD" >> $GITHUB_ENV

          if [ -n "$INSTALL_MODS" ]; then
            INSTALL_CSV=$(echo "$INSTALL_MODS" | tr ' ' ',')
            echo ""
            echo "  🆕 Installing: $INSTALL_CSV"
            kubectl exec "$POD" -n "$NAMESPACE" -- \
              python3 "$ODOO_BIN" -c "$ODOO_CONF" \
              -i "$INSTALL_CSV" \
              --stop-after-init \
              --without-demo=all
            echo "  ✅ Install completed"
          fi

          if [ -n "$UPGRADE_MODS" ]; then
            UPGRADE_CSV=$(echo "$UPGRADE_MODS" | tr ' ' ',')
            echo ""
            echo "  🔄 Upgrading: $UPGRADE_CSV"
            kubectl exec "$POD" -n "$NAMESPACE" -- \
              python3 "$ODOO_BIN" -c "$ODOO_CONF" \
              -u "$UPGRADE_CSV" \
              --stop-after-init \
              --without-demo=all
            echo "  ✅ Upgrade completed"
          fi

      # ────────────────────────────────────────────────────────────────────
      # STAGE 5 — RESTART POD
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 5 — Restart Odoo pod"
        if: env.no_changes == 'false'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  STAGE 5 — RESTART POD"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          kubectl rollout restart deployment/odoo -n "$NAMESPACE"
          kubectl rollout status deployment/odoo -n "$NAMESPACE" --timeout=120s
          echo "  ✅ Pod restarted successfully"

      # ────────────────────────────────────────────────────────────────────
      # STAGE 6 — SUMMARY
      # ────────────────────────────────────────────────────────────────────
      - name: "Stage 6 — Deployment summary"
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOYMENT SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Repo   : ${{ inputs.repo_key }}"
          echo "  Branch : ${{ inputs.branch }}"
          echo ""
          if [ "$no_changes" = "true" ]; then
            echo "  ✅ No changes detected — nothing was deployed"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "  ✅ DEPLOYMENT SUCCESSFUL"
            [ -n "$INSTALL_MODS" ] && echo "  🆕 Installed : $INSTALL_MODS"
            [ -n "$UPGRADE_MODS" ] && echo "  🔄 Upgraded  : $UPGRADE_MODS"
          else
            echo "  ❌ DEPLOYMENT FAILED — check logs above"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
