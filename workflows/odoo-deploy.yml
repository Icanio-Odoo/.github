# =============================================================================
# Reusable Odoo Deployment Workflow
# Repo : Icanio-Odoo/.github
# Path : .github/workflows/odoo-deploy.yml
# =============================================================================

name: Odoo Deploy (reusable)

on:
  workflow_call:
    inputs:
      repo_key:
        description: "Short key: hr | finance | techschool | addons"
        required: true
        type: string
      branch:
        description: "Branch to deploy"
        required: false
        type: string
        default: "development"
    secrets:
      DEPLOY_SCRIPT_PATH:
        required: true
      ODOO_DB_NAME:
        required: true
      ODOO_ADMIN_PASSWORD:
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.repo_key }} → Odoo
    runs-on: [self-hosted, odoo-deploy]
    timeout-minutes: 30

    steps:
      - name: Runner info
        run: |
          echo "Runner  : $RUNNER_NAME"
          echo "Repo key: ${{ inputs.repo_key }}"
          echo "Branch  : ${{ inputs.branch }}"

      - name: Run deploy.sh
        env:
          # ── Sensitive — from GitHub Secrets ──
          ODOO_DB_NAME:        ${{ secrets.ODOO_DB_NAME }}
          ODOO_ADMIN_PASSWORD: ${{ secrets.ODOO_ADMIN_PASSWORD }}
          # ── Non-sensitive — from GitHub Variables ──
          ODOO_NAMESPACE:      ${{ vars.ODOO_NAMESPACE }}
          EFS_ADDONS_PATH:     ${{ vars.EFS_ADDONS_PATH }}
          ODOO_URL:            ${{ vars.ODOO_URL }}
        run: |
          SCRIPT="${{ secrets.DEPLOY_SCRIPT_PATH }}"

          if [ ! -f "$SCRIPT" ]; then
            echo "::error::deploy.sh not found at $SCRIPT"
            exit 1
          fi

          chmod +x "$SCRIPT"
          "$SCRIPT" "${{ inputs.repo_key }}" --branch "${{ inputs.branch }}"

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed ${{ inputs.repo_key }} (${{ inputs.branch }}) successfully"
          else
            echo "❌ Deployment of ${{ inputs.repo_key }} failed — check logs above"
          fi
