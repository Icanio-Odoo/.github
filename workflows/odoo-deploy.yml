# =============================================================================
# Reusable Odoo Deployment Workflow
# Repo   : Icanio-Odoo/.github
# Path   : .github/workflows/odoo-deploy.yml
#
# Called by each repo's caller workflow on push to `development`.
# The self-hosted runner must be registered at the org level with
# the label "odoo-deploy" (see runner-setup/README.md).
# =============================================================================

name: Odoo Deploy (reusable)

on:
  workflow_call:
    inputs:
      repo_key:
        description: "Short key for deploy.sh — one of: hr | finance | techschool | addons"
        required: true
        type: string
      branch:
        description: "Branch to deploy (default: development)"
        required: false
        type: string
        default: "development"
    secrets:
      DEPLOY_SCRIPT_PATH:
        description: "Absolute path to deploy.sh on the runner VM"
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.repo_key }} → Odoo
    runs-on: [self-hosted, odoo-deploy]   # matches runner label on the VM
    timeout-minutes: 30

    steps:
      # ── 1. Confirm runner context ──────────────────────────────────────
      - name: Runner info
        run: |
          echo "Runner:  $RUNNER_NAME"
          echo "Repo key: ${{ inputs.repo_key }}"
          echo "Branch:   ${{ inputs.branch }}"

      # ── 2. Run deploy.sh ───────────────────────────────────────────────
      - name: Run deploy.sh
        run: |
          SCRIPT="${{ secrets.DEPLOY_SCRIPT_PATH }}"

          if [ ! -f "$SCRIPT" ]; then
            echo "::error::deploy.sh not found at $SCRIPT"
            exit 1
          fi

          if [ ! -x "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
          fi

          "$SCRIPT" "${{ inputs.repo_key }}" --branch "${{ inputs.branch }}"

      # ── 3. Post result ─────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployed ${{ inputs.repo_key }} (${{ inputs.branch }}) successfully"
          else
            echo "❌ Deployment of ${{ inputs.repo_key }} failed — check logs above"
          fi
